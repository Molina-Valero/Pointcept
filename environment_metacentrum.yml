name: pointcept-torch2.5.0-cu12.4
channels:
  - pyg
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - gcc=13.2
  - gxx=13.2
  - cuda-toolkit=12.4
  - pytorch=2.5.0
  - torchvision=0.20.0
  - torchaudio=2.5.0
  - pytorch-cuda=12.4
  - ninja
  - google-sparsehash
  - h5py
  - pyyaml
  - tensorboard
  - tensorboardx
  - wandb
  - yapf
  - addict
  - einops
  - scipy
  - plyfile
  - termcolor
  - timm
  - ftfy
  - regex
  - tqdm
  - matplotlib
  - black
  - open3d
  - pip:
    - torch-cluster -f https://data.pyg.org/whl/torch-2.5.0+cu124.html
    - torch-scatter -f https://data.pyg.org/whl/torch-2.5.0+cu124.html
    - torch-sparse -f https://data.pyg.org/whl/torch-2.5.0+cu124.html
    - torch_geometric
    - spconv-cu124
    - peft
    - transformers==4.50.3
    - git+https://github.com/octree-nn/ocnn-pytorch.git
    - git+https://github.com/openai/CLIP.git
    - git+https://github.com/Dao-AILab/flash-attention.git@v2.7.4

# NOTE: ./libs/pointops and ./libs/pointgroup_ops are intentionally omitted here.
# They require --no-build-isolation (they import torch at build time) and are
# installed as a post-create step in install_env_metacentrum.sh.
