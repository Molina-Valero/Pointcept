name: pointcept-torch2.7.0-cu12.6
channels:
  - pyg
  - pytorch
  - nvidia
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch=2.7.0
  - torchvision=0.22.0
  - torchaudio=2.7.0
  - pytorch-cuda=12.6
  - ninja
  - google-sparsehash
  - h5py
  - pyyaml
  - tensorboard
  - tensorboardx
  - wandb
  - yapf
  - addict
  - einops
  - scipy
  - plyfile
  - termcolor
  - timm
  - ftfy
  - regex
  - tqdm
  - matplotlib
  - black
  - open3d
  - pip:
    - torch-cluster -f https://data.pyg.org/whl/torch-2.7.0+cu126.html
    - torch-scatter -f https://data.pyg.org/whl/torch-2.7.0+cu126.html
    - torch-sparse -f https://data.pyg.org/whl/torch-2.7.0+cu126.html
    - torch_geometric
    - spconv-cu126
    - peft
    - transformers==4.50.3
    - git+https://github.com/octree-nn/ocnn-pytorch.git
    - git+https://github.com/openai/CLIP.git
    - flash-attn                # PyPI prebuilt — avoids long source compilation
    # NOTE: pointops and pointgroup_ops are built separately after env creation
    # using build_libs.sh to ensure correct CUDA toolkit is used
