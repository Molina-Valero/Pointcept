name: pointcept
channels:
  - pyg
  - pytorch
  - conda-forge
  - anaconda
  - defaults
dependencies:
  - python=3.8
  - pip
  # CUDA + compilers (optional if CUDA already installed on system)
  - conda-forge::cuda-toolkit=11.8
  - conda-forge::cuda-cccl=11.8  # provides <nv/target> header required by cuda_fp16.h
  - conda-forge::cudnn
  - conda-forge::gcc=13.2
  - conda-forge::gxx=13.2
  # Build tools
  - ninja
  # PyTorch ecosystem
  - pytorch::pytorch=2.1.0
  - pytorch::torchvision=0.16.0
  - pytorch::torchaudio=2.1.0
  - pytorch::pytorch-cuda=11.8
  # Data / config
  - anaconda::h5py
  - anaconda::pyyaml
  # General ML / utilities
  - conda-forge::sharedarray
  - conda-forge::tensorboard
  - conda-forge::tensorboardx
  - conda-forge::wandb
  - conda-forge::yapf
  - conda-forge::addict
  - conda-forge::einops
  - conda-forge::scipy
  - conda-forge::plyfile
  - conda-forge::termcolor
  - conda-forge::timm
  # Visualization (optional)
  - conda-forge::open3d
  # PyG extensions
  - pyg::pytorch-cluster
  - pyg::pytorch-scatter
  - pyg::pytorch-sparse
  - pip:
    - torch-geometric
    - spconv-cu118
    - ftfy 
    - regex 
    - tqdm
    - git+https://github.com/openai/CLIP.git
    - transformers==4.50.3
    - peft
    - open3d

# NOTE: ./libs/pointops and ./libs/pointgroup_ops are intentionally omitted here.
# They require --no-build-isolation (they import torch at build time) and are
# installed as a post-create step in install_env_metacentrum.sh.
