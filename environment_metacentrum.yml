name: pointcept
channels:
  - pytorch
  - nvidia
  - pyg
  - conda-forge
  - anaconda
  - defaults
dependencies:
  - python=3.8
  - pip
  # CUDA toolkit + compilers (optional if CUDA already installed on system)
  # IMPORTANT: conda-forge does NOT publish cuda-toolkit below version 12.0
  # (verified via `mamba search cuda-toolkit -c conda-forge` on this cluster -
  # smallest available is 12.0.0). Do not change this back to
  # conda-forge::cuda-toolkit=11.8 - it does not exist and will fail to solve.
  # The nvidia channel has 11.8.0, which matches pytorch-cuda=11.8 below.
  - nvidia::cuda-toolkit=11.8
  - nvidia::cuda-nvcc=11.8
  - nvidia::cuda-compiler=11.8
  - nvidia::cuda-cccl=11.8
  - conda-forge::cudnn
  - conda-forge::gcc=11
  - conda-forge::gxx=11
  # Build tools
  - ninja
  # PyTorch ecosystem
  # pytorch-cuda=11.8 will pull in the matching cuda-cudart/cuda-cccl/etc.
  # from the nvidia channel automatically - do not pin those separately
  # from conda-forge, or the solver will hit a version/channel conflict.
  - pytorch::pytorch=2.1.0
  - pytorch::torchvision=0.16.0
  - pytorch::torchaudio=2.1.0
  - pytorch::pytorch-cuda=11.8
  # Data / config
  - anaconda::h5py
  - anaconda::pyyaml
  # General ML / utilities
  - conda-forge::sharedarray
  - conda-forge::tensorboard
  - conda-forge::tensorboardx
  - conda-forge::wandb
  - conda-forge::yapf
  - conda-forge::addict
  - conda-forge::einops
  - conda-forge::scipy
  - conda-forge::plyfile
  - conda-forge::termcolor
  - conda-forge::timm
  # PyG extensions
  - pyg::pytorch-cluster
  - pyg::pytorch-scatter
  - pyg::pytorch-sparse
  - pip:
    - torch-geometric
    - spconv-cu118
    - ftfy 
    - regex 
    - tqdm
    - git+https://github.com/openai/CLIP.git
    - peft
    - open3d

# NOTE: ./libs/pointops and ./libs/pointgroup_ops are intentionally omitted here.
# They require --no-build-isolation (they import torch at build time) and are
# installed as a post-create step in install_env_metacentrum.sh.
